    // Universal link interceptor to prevent file:///C:/template ERR_FILE_NOT_FOUND

        var href = anchor.getAttribute('href') || anchor.getAttribute('to');
        if (href && (href.startsWith('/template') || href.startsWith('template') || href.startsWith('/s/'))) {
          if (window.location.protocol === 'file:') {

            } catch(err) {
